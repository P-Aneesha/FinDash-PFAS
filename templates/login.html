<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinDash - Login</title>
    
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid #e8e8e8;
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 2.5em; color: #1a1a1a; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.5px; }
        .logo p { color: #888; font-size: 0.95em; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 8px;
            width: 100%;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 1em;
        }

        .tab.active { background: #1a1a1a; color: white; }

        /* KEY FIX: forms hidden by default */
        .form-content { display: none; }
        .form-content.active { display: block; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 0.95em; }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            background: #fafafa;
        }

        input:focus { outline: none; border-color: #1a1a1a; background: white; }
        input::placeholder { color: #999; }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover { background: #333; transform: translateY(-2px); }

        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; text-align: center; }
        .message.success { background: #eafaf1; color: #27ae60; border: 1px solid #27ae60; }
        .message.error { background: #fadbd8; color: #e74c3c; border: 1px solid #e74c3c; }

        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .logo h1 { font-size: 2em; }
            input, button { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>💰 FinDash-PFAS</h1>
            <p>Personal Finance Tracker</p>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
            <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
            <button class="tab" id="tabForgot" onclick="switchTab('forgot')">Forgot Password</button>

        </div>

        <div id="message"></div>

        <!-- Login Form -->
        <div id="loginForm" class="form-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
        <!-- Forgot Password Form -->
        <div id="forgotForm" class="form-content">
            <form onsubmit="handleForgot(event)" id="forgotStepForm">
                <div id="forgotStep1">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="forgotUsername" placeholder="Enter your username" required>
                    </div>
                    <button type="button" onclick="getSecurityQuestion()">Get Security Question</button>
                </div>
                <div id="forgotStep2" style="display:none;">
                    <div class="form-group">
                        <label id="secQuestionLabel" style="color:#3498db;font-size:1em;padding:10px;background:#eaf4fb;border-radius:8px;display:block;"></label>
                    </div>
                    <div class="form-group">
                        <label>Your Answer</label>
                        <input type="text" id="forgotAnswer" placeholder="Enter your answer">
                    </div>
                    <button type="button" onclick="verifyAnswer()">Verify Answer</button>
                </div>

                <div id="forgotStep3" style="display:none;">
                    <div style="background:#eafaf1;color:#27ae60;padding:10px;border-radius:8px;margin-bottom:15px;font-weight:600;text-align:center;">✅ Answer Correct! Set your new password.</div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="forgotNewPassword" placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="forgotConfirmPassword" placeholder="Confirm new password">
                    </div>
                    <button type="button" onclick="resetPassword()">Reset Password</button>
                </div>
            </form>
        </div>
        <!-- Register Form -->
        <div id="registerForm" class="form-content">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullname" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                </div>
                <button type="submit">Register</button>
            </form>
        </div>
    </div>

    <script>
        // KEY FIX: use getElementById instead of event.target
        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('tabForgot').classList.toggle('active', tab === 'forgot');
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('forgotForm').classList.toggle('active', tab === 'forgot');
            document.getElementById('message').innerHTML = '';
        }

        async function getSecurityQuestion() {
            const username = document.getElementById('forgotUsername').value.trim();
            if (!username) { showMessage('Please enter your username!', 'error'); return; }
            try {
                const res = await fetch('/api/get-security-question', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('secQuestionLabel').textContent = '❓ ' + data.question;
                    document.getElementById('forgotStep1').style.display = 'none';
                    document.getElementById('forgotStep2').style.display = 'block';
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (e) {
                showMessage('Error connecting to server', 'error');
            }
        }

        async function verifyAnswer() {
            const username = document.getElementById('forgotUsername').value.trim();
            const answer = document.getElementById('forgotAnswer').value.trim();
            if (!answer) { showMessage('Please enter your answer!', 'error'); return; }
            try {
                const res = await fetch('/api/verify-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, answer })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('forgotStep2').style.display = 'none';
                    document.getElementById('forgotStep3').style.display = 'block';
                    document.getElementById('message').innerHTML = '';
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (e) {
                showMessage('Error connecting to server', 'error');
            }
        }

        async function resetPassword() {
            const username = document.getElementById('forgotUsername').value.trim();
            const newPass = document.getElementById('forgotNewPassword').value;
            const confirmPass = document.getElementById('forgotConfirmPassword').value;
            if (!newPass || !confirmPass) { showMessage('Please enter new password!', 'error'); return; }
            if (newPass !== confirmPass) { showMessage('Passwords do not match!', 'error'); return; }
            if (newPass.length < 6) { showMessage('Password must be at least 6 characters!', 'error'); return; }
            try {
                const res = await fetch('/api/reset-password-verified', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, new_password: newPass })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('✅ ' + data.message + ' Please login!', 'success');
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (e) {
                showMessage('Error connecting to server', 'error');
            }
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('message').innerHTML = '';
        }
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showMessage(data.message || 'Invalid username or password', 'error');
                }
            } catch (error) {
                showMessage('Login failed. Please try again.', 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const fullname = document.getElementById('regFullname').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, fullname, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('Registration successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showMessage(data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage('Registration failed. Please try again.', 'error');
            }
        }

        function showMessage(text, type) {
            document.getElementById('message').innerHTML = `<div class="message ${type}">${text}</div>`;
        }
    </script>
</body>
</html>
