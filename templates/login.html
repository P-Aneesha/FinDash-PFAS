<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - FinDash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .form { display: none; }
        .form.active { display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }
        .alert.show { display: block; }
        .alert.success { background: #d1f4e0; color: #0d7a3f; }
        .alert.error { background: #ffd6d6; color: #c41e3a; }
    </style>
</head>
<body>
    <div class="box">
        <h1>💰 FinDash</h1>
        <div class="alert" id="alert"></div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Register</button>
        </div>
        <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
            <input type="text" id="loginUser" placeholder="Username" required>
            <input type="password" id="loginPass" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <form id="registerForm" class="form" onsubmit="handleRegister(event)">
            <input type="text" id="regName" placeholder="Full Name">
            <input type="text" id="regUser" placeholder="Username" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Password" required minlength="6">
            <button type="submit">Register</button>
        </form>
    </div>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + 'Form').classList.add('active');
            document.getElementById('alert').classList.remove('show');
        }
        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert ${type} show`;
        }
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('loginUser').value,
                    password: document.getElementById('loginPass').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                showAlert('Login successful!', 'success');
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                showAlert(data.message || 'Login failed', 'error');
            }
        }
        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    full_name: document.getElementById('regName').value,
                    username: document.getElementById('regUser').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPass').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                showAlert('Registration successful!', 'success');
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                showAlert(data.message || 'Registration failed', 'error');
            }
        }
    </script>
</body>
</html>
