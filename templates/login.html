<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FinDash - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #FFF5F7 0%, #FFE5EC 50%, #E8F5E9 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 20px 60px rgba(255, 107, 157, 0.2);
        width: 90%;
        max-width: 450px;
        border: 1px solid rgba(255, 107, 157, 0.1);
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo h1 {
        font-size: 2.5em;
        background: linear-gradient(135deg, #FF6B9D 0%, #C5A3FF 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
        margin-bottom: 5px;
    }

    .logo p {
        color: #718096;
        font-size: 0.95em;
    }

    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        background: #f7fafc;
        padding: 5px;
        border-radius: 15px;
    }

    .tab {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: none;
        cursor: pointer;
        font-weight: 600;
        color: #718096;
        border-radius: 12px;
        transition: all 0.3s;
    }

    .tab.active {
        background: linear-gradient(135deg, #FF6B9D 0%, #C5A3FF 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
    }

    .form-content {
        display: none;
    }

    .form-content.active {
        display: block;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #4a5568;
        font-weight: 600;
        font-size: 0.95em;
    }

    input {
        width: 100%;
        padding: 14px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1em;
        transition: all 0.3s;
        background: #fafafa;
    }

    input:focus {
        outline: none;
        border-color: #FF6B9D;
        background: white;
        box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
    }

    button[type="submit"] {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #FF6B9D 0%, #C5A3FF 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }

    button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
    }

    .message {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-weight: 500;
        text-align: center;
    }

    .message.success {
        background: linear-gradient(135deg, #E6FFFA 0%, #C1F7DC 100%);
        color: #2d5f4d;
        border: 1px solid #A8E6CF;
    }

    .message.error {
        background: linear-gradient(135deg, #FFF5F7 0%, #FFE5EC 100%);
        color: #8b3a4a;
        border: 1px solid #FFB6C1;
    }

    @media (max-width: 480px) {
        .login-container {
            padding: 30px 20px;
        }

        .logo h1 {
            font-size: 2em;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <h1>💰 FinDash-PFAS</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Register</button>
        </div>
        
        <div id="message" class="message"></div>
        
        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <form onsubmit="login(event)">
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="form-container">
            <form onsubmit="register(event)">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="text" id="regFullName" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password (min 6 characters)" required minlength="6">
                <button type="submit">Register</button>
            </form>
        </div>
    </div>
    
    <script>
        function showTab(tab) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
            
            hideMessage();
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        async function login(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('❌ Invalid username or password', 'error');
                }
            } catch (error) {
                showMessage('❌ Login failed. Please try again.', 'error');
            }
        }
        
        async function register(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const fullName = document.getElementById('regFullName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: username,
                        full_name: fullName,
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Registration successful!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Registration failed. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
